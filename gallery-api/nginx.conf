# Nginx config for gallery.vcallia.com
# Place this in /etc/nginx/sites-available/gallery.vcallia.com
# Then: ln -s /etc/nginx/sites-available/gallery.vcallia.com /etc/nginx/sites-enabled/
# Then: certbot --nginx -d gallery.vcallia.com
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name gallery.vcallia.com;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Allow large image uploads (up to 15MB)
        client_max_body_size 15M;
    }
}
